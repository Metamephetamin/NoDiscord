server {
    listen 80;
    listen [::]:80;
    server_name land.tendsec.ru;

    root /var/www/tend-land/current;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|mp4|webm|ogg|mp3|wav|ttf|woff|woff2|exe)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}

