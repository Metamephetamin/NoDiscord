name: CI

on:
  push:
  pull_request:
    branches:
      - dev
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  determine-scope:
    name: Определить режим CI
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.scope.outputs.mode }}

    steps:
      - name: Вычислить объём проверок
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          mode="light"

          if [ "$EVENT_NAME" = "push" ] && [ "$GITHUB_REF_NAME" = "master" ]; then
            mode="skip"
          elif [ "$EVENT_NAME" = "push" ] && [ "$GITHUB_REF_NAME" = "dev" ]; then
            mode="heavy"
          elif [ "$EVENT_NAME" = "pull_request" ] && [ "$BASE_REF" = "dev" ]; then
            mode="heavy"
          fi

          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "CI mode: $mode"

  frontend:
    name: Frontend Validation
    runs-on: ubuntu-latest
    needs: determine-scope
    if: needs.determine-scope.outputs.mode != 'skip'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint:ci

      - name: Check encoding
        run: npm run check:encoding

      - name: Test encoding guard
        run: npm run test:encoding

      - name: Check formatting if configured
        if: needs.determine-scope.outputs.mode == 'heavy'
        run: npm run format:check --if-present

      - name: Typecheck if configured
        if: needs.determine-scope.outputs.mode == 'heavy'
        run: npm run typecheck --if-present

      - name: Run frontend unit tests if configured
        if: needs.determine-scope.outputs.mode == 'heavy'
        run: npm run test:unit --if-present

      - name: Run frontend integration tests if configured
        if: needs.determine-scope.outputs.mode == 'heavy'
        run: npm run test:integration --if-present

      - name: Run frontend e2e tests if configured
        if: needs.determine-scope.outputs.mode == 'heavy'
        run: npm run e2e --if-present

      - name: Run generic frontend tests if configured
        if: needs.determine-scope.outputs.mode == 'heavy'
        run: npm run test --if-present

      - name: Run optional security checks if configured
        if: needs.determine-scope.outputs.mode == 'heavy'
        run: npm run security --if-present

      - name: Build frontend
        run: npm run build:frontend

  backend:
    name: Backend Build and Test
    runs-on: ubuntu-latest
    needs: determine-scope
    if: needs.determine-scope.outputs.mode != 'skip'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore backend
        run: dotnet restore BackNoDiscord/BackNoDiscord.sln

      - name: Build backend
        run: dotnet build BackNoDiscord/BackNoDiscord.sln --configuration Release --no-restore

      - name: Run backend tests (if present)
        shell: bash
        run: |
          mapfile -t test_projects < <(find BackNoDiscord -type f -name "*Tests*.csproj")
          if [ ${#test_projects[@]} -eq 0 ]; then
            echo "No backend test projects found. Skipping dotnet test."
            exit 0
          fi
          for project in "${test_projects[@]}"; do
            echo "Running tests in $project"
            dotnet test "$project" --configuration Release --no-build --verbosity normal
          done
