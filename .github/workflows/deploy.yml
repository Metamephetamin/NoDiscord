name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  DOTNET_VERSION: "8.0.x"

jobs:
  build-artifacts:
    name: Build Deployment Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint:ci

      - name: Check encoding
        run: npm run check:encoding

      - name: Build frontend
        run: npm run build:frontend

      - name: Restore backend
        run: dotnet restore BackNoDiscord/BackNoDiscord.sln

      - name: Build backend solution
        run: dotnet build BackNoDiscord/BackNoDiscord.sln --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test BackNoDiscord/BackNoDiscord.Tests/BackNoDiscord.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Publish backend
        run: dotnet publish BackNoDiscord/BackNoDiscord/BackNoDiscord.csproj --configuration Release --output ./artifacts/backend

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: artifacts/backend

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-artifacts

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: backend

      - name: Validate deploy secrets
        id: validate
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deploy secrets are not fully configured. Skipping deploy step."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Setup SSH agent
        if: steps.validate.outputs.ready == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add deploy host to known_hosts
        if: steps.validate.outputs.ready == 'true'
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync artifacts to server
        if: steps.validate.outputs.ready == 'true'
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          FRONTEND_DEPLOY_PATH: ${{ vars.FRONTEND_DEPLOY_PATH }}
          BACKEND_DEPLOY_PATH: ${{ vars.BACKEND_DEPLOY_PATH }}
          BACKEND_SERVICE_NAME: ${{ vars.BACKEND_SERVICE_NAME }}
          FRONTEND_DEPLOY_OWNER: ${{ vars.FRONTEND_DEPLOY_OWNER }}
          BACKEND_DEPLOY_OWNER: ${{ vars.BACKEND_DEPLOY_OWNER }}
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          FRONTEND_PATH="${FRONTEND_DEPLOY_PATH:-/var/www/tend-app/current}"
          BACKEND_PATH="${BACKEND_DEPLOY_PATH:-/opt/nodiscord/.deploy/backend}"
          BACKEND_SERVICE="${BACKEND_SERVICE_NAME:-nodiscord-backend.service}"
          FRONTEND_OWNER="${FRONTEND_DEPLOY_OWNER:-www-data:www-data}"
          BACKEND_OWNER="${BACKEND_DEPLOY_OWNER:-nodiscord:nodiscord}"
          HEALTHCHECK="${HEALTHCHECK_URL:-https://tendsec.ru}"
          TEMP_ROOT="/tmp/tend-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          ssh -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$TEMP_ROOT/frontend' '$TEMP_ROOT/backend' '$FRONTEND_PATH' '$BACKEND_PATH'"

          rsync -az --delete -e "ssh -p $PORT" ./frontend/ "$DEPLOY_USER@$DEPLOY_HOST:$TEMP_ROOT/frontend/"
          rsync -az --delete -e "ssh -p $PORT" ./backend/ "$DEPLOY_USER@$DEPLOY_HOST:$TEMP_ROOT/backend/"

          ssh -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" "
            set -e
            FRONTEND_PATH='$FRONTEND_PATH'
            BACKEND_PATH='$BACKEND_PATH'
            TEMP_ROOT='$TEMP_ROOT'
            FRONTEND_OWNER='$FRONTEND_OWNER'
            BACKEND_OWNER='$BACKEND_OWNER'
            BACKEND_SERVICE='$BACKEND_SERVICE'
            for required_path in \"\$FRONTEND_PATH\" \"\$BACKEND_PATH\"; do
              case \"\$required_path\" in
                /var/www/*|/opt/nodiscord/*) ;;
                *)
                  echo \"Unsafe deploy path: \$required_path\" >&2
                  exit 1
                  ;;
              esac
            done
            rsync -az --delete \"\$TEMP_ROOT/frontend/\" \"\$FRONTEND_PATH/\"
            rsync -az --delete \"\$TEMP_ROOT/backend/\" \"\$BACKEND_PATH/\"
            chown -R \"\$FRONTEND_OWNER\" \"\$FRONTEND_PATH\"
            chown -R \"\$BACKEND_OWNER\" \"\$BACKEND_PATH\"
            systemctl restart \"\$BACKEND_SERVICE\"
            systemctl reload nginx
            rm -rf \"\$TEMP_ROOT\"
          "

          curl --fail --silent --show-error --location "$HEALTHCHECK" > /dev/null
