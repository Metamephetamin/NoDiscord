name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  DOTNET_VERSION: "8.0.x"

jobs:
  guard-master:
    name: Проверить release-ветку
    runs-on: ubuntu-latest

    steps:
      - name: Проверить, что workflow запущен из master
        shell: bash
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$GITHUB_REF_NAME" != "master" ]; then
            echo "Продакшен-деплой разрешён только из ветки master. Текущая ветка: $GITHUB_REF_NAME" >&2
            exit 1
          fi

  build-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: guard-master

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Check encoding
        run: npm run check:encoding

      - name: Test encoding guard
        run: npm run test:encoding

      - name: Build frontend
        run: npm run build:frontend

      - name: Measure frontend artifact
        shell: bash
        run: |
          set -euo pipefail
          echo "Frontend dist directory size:"
          du -sh ./dist

      - name: Restore backend
        run: dotnet restore BackNoDiscord/BackNoDiscord.sln

      - name: Publish backend
        run: dotnet publish BackNoDiscord/BackNoDiscord/BackNoDiscord.csproj --configuration Release --no-restore --output ./artifacts/backend

      - name: Measure backend artifact
        shell: bash
        run: |
          set -euo pipefail
          echo "Backend publish directory size:"
          du -sh ./artifacts/backend

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Upload backend publish
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: artifacts/backend/

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs:
      - build-artifacts
    environment: production
    timeout-minutes: 40
    outputs:
      deploy_ready: ${{ steps.validate.outputs.ready }}

    steps:
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-package

      - name: Download backend publish
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: backend-package

      - name: Validate deploy secrets
        id: validate
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deploy secrets are not fully configured. Skipping deploy step."
            exit 0
          fi
          if [ -n "$BACKEND_ENV_FILE" ]; then
            echo "has_backend_env=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_backend_env=false" >> "$GITHUB_OUTPUT"
            echo "BACKEND_ENV_FILE is empty or missing. Deploy will continue without replacing backend .env."
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Prepare deploy SSH key
        if: steps.validate.outputs.ready == 'true'
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

      - name: Add deploy host to known_hosts
        if: steps.validate.outputs.ready == 'true'
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts || true

      - name: Debug deploy SSH identity
        if: steps.validate.outputs.ready == 'true'
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          echo "Resolved deploy target: ${DEPLOY_USER}@${DEPLOY_HOST}:${PORT}"
          echo "Deploy key fingerprint:"
          ssh-keygen -lf "$HOME/.ssh/deploy_key"
          if [ "$DEPLOY_USER" = "root" ]; then
            echo "DEPLOY_USER matches expected root: yes"
          else
            echo "DEPLOY_USER matches expected root: no"
          fi
          if [ "$DEPLOY_HOST" = "185.233.193.162" ]; then
            echo "DEPLOY_HOST matches expected 185.233.193.162: yes"
          else
            echo "DEPLOY_HOST matches expected 185.233.193.162: no"
          fi

      - name: Debug SSH preflight
        if: steps.validate.outputs.ready == 'true'
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          SSH_OPTS="-vvv -i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -p $PORT -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "true"

      - name: Sync frontend dist to server
        if: steps.validate.outputs.ready == 'true'
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          FRONTEND_DEPLOY_PATH: ${{ vars.FRONTEND_DEPLOY_PATH }}
          BACKEND_DEPLOY_PATH: ${{ vars.BACKEND_DEPLOY_PATH }}
          FRONTEND_DEPLOY_OWNER: ${{ vars.FRONTEND_DEPLOY_OWNER }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          FRONTEND_PATH="${FRONTEND_DEPLOY_PATH:-/var/www/tend-app/current}"
          FRONTEND_OWNER="${FRONTEND_DEPLOY_OWNER:-www-data:www-data}"
          TEMP_ROOT="/tmp/tend-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          FRONTEND_SOURCE="./frontend-package"
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -p $PORT -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"

          echo "Frontend deploy target: $DEPLOY_USER@$DEPLOY_HOST:$FRONTEND_PATH"
          if [ -d "$FRONTEND_SOURCE/dist" ]; then
            FRONTEND_SOURCE="$FRONTEND_SOURCE/dist"
          fi
          if [ ! -f "$FRONTEND_SOURCE/index.html" ]; then
            echo "Frontend dist is missing index.html: $FRONTEND_SOURCE" >&2
            exit 1
          fi
          echo "Creating frontend directories on server"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$TEMP_ROOT' '$FRONTEND_PATH'"

          echo "Syncing changed frontend files"
          case "$FRONTEND_PATH" in
            /var/www/*) ;;
            *)
              echo "Unsafe frontend deploy path: $FRONTEND_PATH" >&2
              exit 1
              ;;
          esac
          rsync -az --checksum --chown="$FRONTEND_OWNER" --info=progress2 --timeout=60 -e "ssh $SSH_OPTS" "$FRONTEND_SOURCE/" "$DEPLOY_USER@$DEPLOY_HOST:$FRONTEND_PATH/"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "find '$FRONTEND_PATH/assets' -type f -mtime +14 -delete 2>/dev/null || true"
          echo "Frontend deploy sync completed"

      - name: Sync backend publish to server
        if: steps.validate.outputs.ready == 'true'
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          BACKEND_DEPLOY_PATH: ${{ vars.BACKEND_DEPLOY_PATH }}
          BACKEND_DEPLOY_OWNER: ${{ vars.BACKEND_DEPLOY_OWNER }}
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          BACKEND_PATH="${BACKEND_DEPLOY_PATH:-/opt/nodiscord/.deploy/backend}"
          BACKEND_OWNER="${BACKEND_DEPLOY_OWNER:-nodiscord:nodiscord}"
          TEMP_ROOT="/tmp/tend-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          TEMP_ENV_FILE="$TEMP_ROOT/backend.env"
          BACKEND_SOURCE="./backend-package"
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -p $PORT -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"

          echo "Backend deploy target: $DEPLOY_USER@$DEPLOY_HOST:$BACKEND_PATH"
          if [ -d "$BACKEND_SOURCE/backend" ]; then
            BACKEND_SOURCE="$BACKEND_SOURCE/backend"
          fi
          if [ ! -f "$BACKEND_SOURCE/BackNoDiscord.dll" ]; then
            echo "Backend publish is missing BackNoDiscord.dll: $BACKEND_SOURCE" >&2
            exit 1
          fi
          echo "Creating backend directories on server"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$TEMP_ROOT' '$BACKEND_PATH'"

          echo "Syncing changed backend files"
          case "$BACKEND_PATH" in
            /opt/nodiscord/*) ;;
            *)
              echo "Unsafe backend deploy path: $BACKEND_PATH" >&2
              exit 1
              ;;
          esac
          rsync -az --checksum --delete-delay --chown="$BACKEND_OWNER" --exclude='.env' --info=progress2 --timeout=60 -e "ssh $SSH_OPTS" "$BACKEND_SOURCE/" "$DEPLOY_USER@$DEPLOY_HOST:$BACKEND_PATH/"
          if [ -n "$BACKEND_ENV_FILE" ]; then
            if ! printf '%s\n' "$BACKEND_ENV_FILE" | grep -q '^ConnectionStrings__DefaultConnection='; then
              echo "BACKEND_ENV_FILE must contain ConnectionStrings__DefaultConnection." >&2
              exit 1
            fi
            if ! printf '%s\n' "$BACKEND_ENV_FILE" | grep -q '^Jwt__Key='; then
              echo "BACKEND_ENV_FILE must contain Jwt__Key." >&2
              exit 1
            fi
            if ! printf '%s\n' "$BACKEND_ENV_FILE" | grep -q '^Crypto__Key='; then
              echo "BACKEND_ENV_FILE must contain Crypto__Key." >&2
              exit 1
            fi
            echo "Uploading backend .env file"
            printf '%s\n' "$BACKEND_ENV_FILE" | ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "cat > '$TEMP_ENV_FILE'"
          fi

          echo "Applying backend environment on server"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "timeout 15m bash -lc '
            set -e
            BACKEND_PATH='$BACKEND_PATH'
            TEMP_ROOT='$TEMP_ROOT'
            TEMP_ENV_FILE='$TEMP_ENV_FILE'
            BACKEND_OWNER='$BACKEND_OWNER'
            case \"\$BACKEND_PATH\" in
              /opt/nodiscord/*) ;;
              *)
                echo \"Unsafe backend deploy path: \$BACKEND_PATH\" >&2
                exit 1
                ;;
            esac
            if [ -f \"\$TEMP_ENV_FILE\" ]; then
              mv \"\$TEMP_ENV_FILE\" \"\$BACKEND_PATH/.env\"
            fi
            if [ ! -f \"\$BACKEND_PATH/.env\" ]; then
              echo \"Backend environment file is missing: \$BACKEND_PATH/.env\"
              echo \"Set BACKEND_ENV_FILE to the full production .env before deploying.\" >&2
              exit 1
            else
              chown \"\$BACKEND_OWNER\" \"\$BACKEND_PATH/.env\"
              chmod 600 \"\$BACKEND_PATH/.env\"
            fi
            echo \"Backend environment apply completed\"
          '"

      - name: Install speech punctuation model dependencies
        if: steps.validate.outputs.ready == 'true'
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          BACKEND_DEPLOY_PATH: ${{ vars.BACKEND_DEPLOY_PATH }}
          BACKEND_DEPLOY_OWNER: ${{ vars.BACKEND_DEPLOY_OWNER }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          BACKEND_PATH="${BACKEND_DEPLOY_PATH:-/opt/nodiscord/.deploy/backend}"
          BACKEND_OWNER="${BACKEND_DEPLOY_OWNER:-nodiscord:nodiscord}"
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -p $PORT -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"

          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "timeout 20m bash -lc '
            set -e
            BACKEND_PATH='$BACKEND_PATH'
            BACKEND_OWNER='$BACKEND_OWNER'
            case \"\$BACKEND_PATH\" in
              /opt/nodiscord/*) ;;
              *)
                echo \"Unsafe backend deploy path: \$BACKEND_PATH\" >&2
                exit 1
                ;;
            esac
            REQUIREMENTS=\"\$BACKEND_PATH/Punctuation/requirements.txt\"
            if [ ! -f \"\$REQUIREMENTS\" ]; then
              echo \"Speech punctuation requirements not found, skipping model dependency install.\"
              exit 0
            fi
            if ! command -v python3 >/dev/null 2>&1; then
              echo \"python3 is not installed on the server; speech punctuation will use conservative fallback.\" >&2
              exit 0
            fi
            if ! python3 -m venv \"\$BACKEND_PATH/.venv\"; then
              if command -v apt-get >/dev/null 2>&1 && [ \"\$(id -u)\" = \"0\" ]; then
                apt-get update
                apt-get install -y python3-venv python3-pip
                python3 -m venv \"\$BACKEND_PATH/.venv\"
              else
                echo \"python3 venv is not available; speech punctuation will use conservative fallback.\" >&2
                exit 0
              fi
            fi
            \"\$BACKEND_PATH/.venv/bin/python\" -m pip install --upgrade pip
            \"\$BACKEND_PATH/.venv/bin/python\" -m pip install -r \"\$REQUIREMENTS\"
            chown -R \"\$BACKEND_OWNER\" \"\$BACKEND_PATH/.venv\"
            echo \"Speech punctuation Python environment is ready\"
          '"

      - name: Restart backend and reload nginx
        if: steps.validate.outputs.ready == 'true'
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          BACKEND_SERVICE_NAME: ${{ vars.BACKEND_SERVICE_NAME }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          BACKEND_SERVICE="${BACKEND_SERVICE_NAME:-nodiscord-backend.service}"
          TEMP_ROOT="/tmp/tend-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -p $PORT -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"

          echo "Restarting backend service and reloading nginx"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "timeout 10m bash -lc '
            set -e
            BACKEND_SERVICE='$BACKEND_SERVICE'
            TEMP_ROOT='$TEMP_ROOT'
            systemctl restart \"\$BACKEND_SERVICE\"
            systemctl is-active \"\$BACKEND_SERVICE\"
            systemctl reload nginx
            rm -rf \"\$TEMP_ROOT\"
            echo \"Backend restart and nginx reload completed\"
          '"

  health-checks:
    name: Health Checks
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.outputs.deploy_ready == 'true'
    environment: production

    steps:
      - name: Run production health checks
        id: production_health
        continue-on-error: true
        shell: bash
        env:
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          HEALTHCHECK="${HEALTHCHECK_URL:-http://${DEPLOY_HOST}}"
          API_HEALTHCHECK="${HEALTHCHECK%/}/api/ping"
          CHAT_NEGOTIATE_HEALTHCHECK="${HEALTHCHECK%/}/chatHub/negotiate?negotiateVersion=1"
          VOICE_NEGOTIATE_HEALTHCHECK="${HEALTHCHECK%/}/voiceHub/negotiate?negotiateVersion=1"

          echo "Running frontend healthcheck: $HEALTHCHECK"
          curl --fail --silent --show-error --location "$HEALTHCHECK" > /dev/null

          echo "Running backend API healthcheck: $API_HEALTHCHECK"
          curl --fail --silent --show-error --location "$API_HEALTHCHECK" > /dev/null

          echo "Running chat negotiate healthcheck: $CHAT_NEGOTIATE_HEALTHCHECK"
          chat_status="$(curl --silent --show-error --location --request POST --output /dev/null --write-out '%{http_code}' "$CHAT_NEGOTIATE_HEALTHCHECK")"
          if [ "$chat_status" -ge 500 ] || [ "$chat_status" -eq 000 ]; then
            echo "Chat hub negotiate endpoint is unhealthy (HTTP $chat_status)." >&2
            exit 1
          fi

          echo "Running voice negotiate healthcheck: $VOICE_NEGOTIATE_HEALTHCHECK"
          voice_status="$(curl --silent --show-error --location --request POST --output /dev/null --write-out '%{http_code}' "$VOICE_NEGOTIATE_HEALTHCHECK")"
          if [ "$voice_status" -ge 500 ] || [ "$voice_status" -eq 000 ]; then
            echo "Voice hub negotiate endpoint is unhealthy (HTTP $voice_status)." >&2
            exit 1
          fi

      - name: Collect backend diagnostics
        if: steps.production_health.outcome == 'failure'
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          BACKEND_SERVICE_NAME: ${{ vars.BACKEND_SERVICE_NAME }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          BACKEND_SERVICE="${BACKEND_SERVICE_NAME:-nodiscord-backend.service}"
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -p "$PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts || true
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -p $PORT -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "bash -lc '
            echo \"=== systemctl status ===\"
            systemctl status \"$BACKEND_SERVICE\" --no-pager || true
            echo \"=== journalctl ===\"
            journalctl -u \"$BACKEND_SERVICE\" -n 160 --no-pager || true
          '"

      - name: Fail production health checks
        if: steps.production_health.outcome == 'failure'
        shell: bash
        run: exit 1
