name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  guard-master:
    name: Проверить release-ветку
    runs-on: windows-latest

    steps:
      - name: Проверить, что workflow запущен из master
        shell: bash
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$GITHUB_REF_NAME" != "master" ]; then
            echo "Сборка release-артефакта Windows разрешена только из ветки master. Текущая ветка: $GITHUB_REF_NAME" >&2
            exit 1
          fi

  build-windows:
    name: Build Windows Package
    runs-on: windows-latest
    needs: guard-master

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check encoding
        run: npm run check:encoding

      - name: Test encoding guard
        run: npm run test:encoding

      - name: Build Windows package
        run: npm run make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nodiscord-windows-build
          path: out/make/**/*
