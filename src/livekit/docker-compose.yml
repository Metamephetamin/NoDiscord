services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    restart: unless-stopped
    env_file:
      - ../../.env
    volumes:
      - ./config.local.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880/tcp"
      - "7881:7881/tcp"
      - "7882:7882/udp"
    command:
      - "--config"
      - "/etc/livekit.yaml"
